name: Live Trading Tick

# Runs one check every 5 minutes during US market hours (9:30-16:00 ET,
# = 13:30-20:00 UTC during EDT) on weekdays. Each run is a fresh,
# stateless process -- run_single_tick() reconstructs portfolio state
# from the database rather than relying on anything carried over
# between runs (see portfolio/state.py's load_portfolio_state()).
#
# GitHub does not guarantee scheduled workflows fire exactly on time --
# they can be delayed under load. That's an accepted tradeoff for a
# genuinely free, always-on-independent-of-any-machine setup.
#
# IMPORTANT: never run this at the same time as `python run_live.py`
# running continuously on a local machine for the same STRATEGY -- both
# would act on the same live signals independently, risking duplicate
# real (paper) orders. Use one or the other, not both.

on:
  schedule:
    - cron: "*/5 13-20 * * 1-5"
  workflow_dispatch: {}  # allows manually triggering a run from the Actions tab, for testing

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one live tick
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRATEGY: trend_following
        run: python -c "from run_live import run_single_tick; run_single_tick()"
